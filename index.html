<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Readlife</title>

<style>
body{margin:0;font-family:Arial;background:#f4f1ea}
header{background:#553b08;color:white;padding:15px 25px;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:28px;font-weight:bold}
button{cursor:pointer}
#app{display:none}

.auth{
  max-width:420px;margin:70px auto;background:white;
  padding:25px;border-radius:12px;box-shadow:0 0 10px rgba(0,0,0,.15)
}

input{width:100%;padding:10px;margin:6px 0}
.btn{background:#553b08;color:white;border:none;padding:10px;border-radius:8px}

.layout{display:flex;gap:20px;padding:20px}
.sidebar,.card{background:white;padding:15px;border-radius:10px}
.sidebar{width:260px}
.content{flex:1}

.grid{display:flex;flex-wrap:wrap;gap:12px}
.book{width:160px;background:#fff;border-radius:10px;padding:10px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.cover{height:180px;background:#d8c7a3;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:bold}

.search{display:flex;gap:10px;margin-bottom:15px}
.search input{flex:1}

.shelf{margin:8px 0}
.badge{background:#eee;padding:3px 8px;border-radius:10px}
.small{font-size:12px;color:#666}
</style>
</head>

<body>

<div id="login" class="auth">
  <h1>📚 Readlife</h1>
  <p>Discover books you'll love.</p>
  <input id="username" placeholder="Username">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button class="btn" onclick="login()">Enter</button>
</div>

<div id="app">

<header>
  <div class="logo">📚 Readlife</div>
  <div id="topUser"></div>
</header>

<div class="layout">

  <div class="sidebar">
    <h3>👤 Profile</h3>
    <p id="welcome"></p>

    <h3>📚 Shelves</h3>
    <div class="shelf">Want <span class="badge" id="wantCount">0</span></div>
    <div class="shelf">Reading <span class="badge" id="readingCount">0</span></div>
    <div class="shelf">Finished <span class="badge" id="doneCount">0</span></div>

    <p class="small">Saved locally in your browser</p>
  </div>

  <div class="content">

    <div class="card">
      <h3>🔍 Search</h3>
      <div class="search">
        <input id="searchBox" placeholder="Search books...">
        <button class="btn" onclick="searchBooks()">Search</button>
      </div>
      <div id="searchResult"></div>
    </div>

    <div class="card" style="margin-top:15px">
      <h3>🔥 Books</h3>
      <div class="grid" id="books"></div>
    </div>

  </div>

</div>
</div>

<script>
const books = [
"Eragon","Eldest","Brisingr","Inheritance",
"Harry Potter","The Maze Runner","Skyward",
"The Graveyard Book","Ready Player One",
"A Wizard of Earthsea","Magnus Chase","Percy Jackson"
];

let state = {
  user: "",
  shelves: {
    want: [],
    reading: [],
    finished: []
  }
};

function save(){
  localStorage.setItem("readlife", JSON.stringify(state));
}

function load(){
  const data = localStorage.getItem("readlife");
  if(data) state = JSON.parse(data);
}

function login(){
  const name = document.getElementById('username').value || "Reader";
  state.user = name;
  save();

  document.getElementById('login').style.display = "none";
  document.getElementById('app').style.display = "block";

  document.getElementById('welcome').innerText = "Welcome, " + name;
  document.getElementById('topUser').innerText = name;

  loadBooks();
  updateCounts();
}

function addToShelf(book, shelf){
  if(!state.shelves[shelf].includes(book)){
    state.shelves[shelf].push(book);
  }
  save();
  updateCounts();
  alert(`${book} → ${shelf}`);
}

function updateCounts(){
  document.getElementById("wantCount").innerText = state.shelves.want.length;
  document.getElementById("readingCount").innerText = state.shelves.reading.length;
  document.getElementById("doneCount").innerText = state.shelves.finished.length;
}

function loadBooks(){
  const area = document.getElementById('books');
  area.innerHTML = "";

  books.forEach(book=>{
    area.innerHTML += `
      <div class="book">
        <div class="cover">${book}</div>
        <h4>${book}</h4>

        <button class="btn" onclick="addToShelf('${book}','want')">Want</button>
        <button class="btn" onclick="addToShelf('${book}','reading')">Reading</button>
        <button class="btn" onclick="addToShelf('${book}','finished')">Done</button>
      </div>
    `;
  });
}

function searchBooks(){
  const q = document.getElementById("searchBox").value.toLowerCase();
  const found = books.filter(b => b.toLowerCase().includes(q));

  document.getElementById("searchResult").innerText =
    found.length ? "Found: " + found.join(", ") : "No books found.";
}

load();
</script>

</body>
</html>
